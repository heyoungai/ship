name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          output="ship-${GOOS}-${GOARCH}${ext}"
          go build -ldflags="-s -w -X github.com/heyoungai/ship/cmd.Version=${VERSION}" -o "dist/${output}" .
          echo "BINARY=${output}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}
          path: dist/${{ env.BINARY }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true

  update-scoop:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} --dir release-assets
          cd release-assets
          sha256sum *.exe > checksums.txt

      - name: Update scoop manifest
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd release-assets

          AMD64_HASH=$(grep "ship-windows-amd64.exe" checksums.txt | cut -d' ' -f1)
          ARM64_HASH=$(grep "ship-windows-arm64.exe" checksums.txt | cut -d' ' -f1)

          cat > ../bucket/ship.json << EOF
          {
            "version": "${VERSION}",
            "architecture": {
              "64bit": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/ship-windows-amd64.exe#/ship.exe",
                "hash": "${AMD64_HASH}"
              },
              "arm64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/ship-windows-arm64.exe#/ship-arm64.exe",
                "hash": "${ARM64_HASH}"
              }
            },
            "bin": "ship.exe",
            "checkver": {
              "github": "https://github.com/${{ github.repository }}"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/v\$version/ship-windows-amd64.exe#/ship.exe"
                },
                "arm64": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/v\$version/ship-windows-arm64.exe#/ship-arm64.exe"
                }
              },
              "hash": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v\$version/checksums.txt"
              }
            }
          }
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/ship.json
          git commit -m "chore: update scoop manifest to v${{ steps.version.outputs.VERSION }}"
          git push
