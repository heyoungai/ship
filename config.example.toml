# ship.toml v2 草案
# 放在项目根目录，命名为 ship.toml
#
# 注意：
# 1. 这是下一代配置模型草案，用于指导 ship 后续演进
# 2. 当前代码已支持 docker/registry/compose 与 go-binary/scp/binary-install 主链路
# 3. steps / templates / verify 的完整执行能力仍在继续补齐
# 4. 目标是同时覆盖 Docker 项目、组装型项目、Go 二进制项目

schema = 2

# ── 项目元信息 ────────────────────────────────────────────────────
[project]
name = "home"
description = "标准 Docker 镜像项目示例"

# ── 版本来源 ──────────────────────────────────────────────────────
[version]
source = "git-tag"              # git-tag | env | static
fallback = "error"              # error | dev | static
static = ""                     # fallback=static 时使用
override_env = "SHIP_VERSION"   # 外部显式传入版本时使用

# ── 功能开关 ──────────────────────────────────────────────────────
[features]
publish = true
deploy = true
rollback = true
verify = true

# ── 自定义变量（可用于模板与插值）──────────────────────────────────
[vars]
app_name = "home"
remote_tag_key = "APP_IMAGE_TAG"

# ── 构建前准备步骤（可选）──────────────────────────────────────────
[[steps.prepare]]
name = "build-frontend"
run = "bun run build"
cwd = "."
profiles = ["*"]                # "*" 表示全部 profile

# 组装型项目可在 prepare 阶段执行后端 publish、资源复制等动作
# [[steps.prepare]]
# name = "publish-backend"
# run = "dotnet publish ./src/BE/web/Chats.BE.csproj -c Release -o ./dist"
# cwd = "."
# profiles = ["*"]

# ── 构建阶段 ──────────────────────────────────────────────────────
[build]
driver = "docker"               # docker | go-binary | command

[build.docker]
image = "home"
context = "."
dockerfile = "./Dockerfile"
platforms = ["linux/amd64"]
env_file = "./.env.local"
local_build = "bun run build"
build_args_from_env = true
load = true
latest_on_default_profile = true
disable_buildkit = false
cache_bust = false

# 需要显式写死的 build args 时可使用：
# [build.docker.build_args]
# NEXT_PUBLIC_API_BASE = "https://api.example.com"

# Go 二进制项目示例：
# [build]
# driver = "go-binary"
#
# [build.go]
# main = "./cmd/swag-cli"
# output = "./build/{{ executable_name }}"
# goos = "linux"
# goarch = "amd64"
# cgo_enabled = false
# executable_name = "swag-cli"
# ldflags = [
#   "-s",
#   "-w",
#   "-X {{ module }}/internal/cli.Version={{ version }}"
# ]

# 自定义命令项目示例：
# [build]
# driver = "command"
#
# [build.command]
# run = "make build"
# cwd = "."
# outputs = ["./dist/app"]

# ── 模板文件生成（可选）────────────────────────────────────────────
[[templates]]
path = "./deploy/.env"
profiles = ["*"]
content = """
APP_IMAGE_TAG={{ version }}
"""

# 组装型项目可生成运行时 Dockerfile / compose / env
# [[templates]]
# path = "./dist/Dockerfile"
# profiles = ["*"]
# content = """
# FROM mcr.microsoft.com/dotnet/aspnet:10.0
# WORKDIR /app
# COPY . /app
# ENTRYPOINT ["dotnet", "Chats.BE.dll"]
# """
#
# [[templates]]
# path = "./dist-docker/docker-compose.yaml"
# profiles = ["*"]
# from = "./scripts/templates/docker-compose.tpl"

# ── 发布阶段 ──────────────────────────────────────────────────────
[publish]
driver = "registry"             # registry | scp | none

[publish.registry]
push = true
tag_latest_on_default_profile = true

[[publish.registry.targets]]
type = "private"                # dockerhub | private
url = "registry.cn-hangzhou.aliyuncs.com"
namespace = "deali"
image = "home"

# 可配置多个镜像仓库
# [[publish.registry.targets]]
# type = "dockerhub"
# namespace = "dealiaxy"
# image = "home"

# Go 二进制 / 文件上传项目示例：
# [publish]
# driver = "scp"
#
# [publish.scp]
# local = "./build/swag-cli"
# host = "deali.cn"
# remote = "/tmp/swag-cli"

# ── 部署阶段 ──────────────────────────────────────────────────────
[deploy]
driver = "compose"              # compose | binary-install | ssh | none

[deploy.compose]
host = "deali.cn"               # SSH Host（~/.ssh/config 别名或 user@ip）
path = "/home/deali/projects/home"
env_file = ".env"
tag_key = "{{ vars.remote_tag_key }}"
up = "docker compose --env-file ./.env up -d --remove-orphans"

# Go 二进制安装示例：
# [deploy]
# driver = "binary-install"
#
# [deploy.binary_install]
# host = "deali.cn"
# remote_temp_path = "/tmp"
# remote_install_path = "/usr/local/bin"
# use_ssh_tty = true
# sudo_nopasswd = false
# chmod = "+x"

# 任意 SSH 命令示例：
# [deploy]
# driver = "ssh"
#
# [deploy.ssh]
# host = "deali.cn"
# commands = [
#   "systemctl restart my-service",
#   "systemctl status my-service --no-pager"
# ]

# ── 部署后校验（可选）──────────────────────────────────────────────
[verify]
driver = "http"                 # http | ssh | command | none

[verify.http]
url = "https://deali.cn/api/health"
expected_status = 200
attempts = 20
interval_seconds = 3
timeout_seconds = 5

# SSH 校验示例：
# [verify]
# driver = "ssh"
#
# [verify.ssh]
# host = "deali.cn"
# command = "docker compose ps"

# 本地命令校验示例：
# [verify]
# driver = "command"
#
# [verify.command]
# run = "test -f ./deploy/.env"
# shell = "sh"

# ── 矩阵构建（可选）───────────────────────────────────────────────
[[matrix]]
name = "brand-a"
default = true
env = { NEXT_PUBLIC_APP_BRAND = "brand-a" }
vars = { brand = "brand-a" }

[[matrix]]
name = "brand-b"
env = { NEXT_PUBLIC_APP_BRAND = "brand-b" }
vars = { brand = "brand-b" }
